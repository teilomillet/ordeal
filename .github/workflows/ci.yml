name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - run: uv python install 3.13

      - run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check --fix .

      - name: Ruff format
        run: uv run ruff format .

      - name: Commit lint and format fixes
        if: github.event_name == 'push'
        run: |
          git diff --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "style: auto-fix lint and format with ruff"
          git push

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.13"
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - run: uv python install ${{ matrix.python-version }}

      - run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest --tb=short -q

  perf-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7

      - run: uv python install 3.12

      - run: uv sync --extra dev

      - name: Enforce perf and audit-quality contract
        run: uv run ordeal benchmark --perf-contract ordeal.perf.toml --check

  bump-and-publish:
    if: github.event_name == 'push'
    needs: [lint, test, perf-contract]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Bump patch version
        run: |
          git fetch --tags
          git pull --rebase origin main
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Skip if this version was already tagged (e.g. re-run)
          while git tag -l "v$NEW" | grep -q .; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          done
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Update changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits grouped by type
          FEATS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" | sed 's/^- feat: /- /' | sed 's/^- feat(/- (/')
          FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" | sed 's/^- fix: /- /' | sed 's/^- fix(/- (/')
          DOCS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^docs" | sed 's/^- docs: /- /' | sed 's/^- docs(/- (/')
          OTHER=$(git log "$RANGE" --pretty=format:"- %s" --grep="^refactor\|^perf\|^test" | head -5)

          # Skip if no meaningful commits
          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            echo "No feat/fix commits — skipping changelog update"
            exit 0
          fi

          # Build the new entry
          ENTRY="## $NEW_VERSION"$'\n'
          if [ -n "$FEATS" ]; then
            ENTRY+=$'\n'"**Features:**"$'\n'$'\n'"$FEATS"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            ENTRY+=$'\n'"**Fixes:**"$'\n'$'\n'"$FIXES"$'\n'
          fi
          if [ -n "$DOCS" ]; then
            ENTRY+=$'\n'"**Docs:**"$'\n'$'\n'"$DOCS"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            ENTRY+=$'\n'"**Other:**"$'\n'$'\n'"$OTHER"$'\n'
          fi

          # Prepend to CHANGELOG.md (after the "# Changelog" header)
          export ENTRY
          python3 -c "
          import pathlib, os
          entry = os.environ['ENTRY']
          p = pathlib.Path('CHANGELOG.md')
          if p.exists():
              old = p.read_text()
              p.write_text(old.replace('# Changelog', '# Changelog\n\n' + entry, 1))
          else:
              p.write_text('# Changelog\n\n' + entry + '\n')
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml CHANGELOG.md
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

      - name: Pull latest before build
        run: git pull --rebase origin main

      - name: Build
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
