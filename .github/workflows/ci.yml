name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.14"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.14

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  test:
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.12", "3.13", "3.14"]
        include:
          - os: macos-latest
            python-version: "3.14"
          - os: windows-latest
            python-version: "3.14"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install ${{ matrix.python-version }}

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Run tests
        run: uv run pytest --tb=short -q

  perf-contract-pr:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Run lean perf gate
        id: perf
        run: |
          mkdir -p .artifacts
          set +e
          uv run ordeal benchmark \
            --perf-contract ordeal.perf.toml \
            --tier pr \
            --check \
            --output-json .artifacts/perf-contract-pr.json
          status=$?
          if [ ! -f .artifacts/perf-contract-pr.json ]; then
            printf '{\n  "passed": false,\n  "error": "perf gate did not produce JSON",\n  "exit_code": %s\n}\n' "$status" > .artifacts/perf-contract-pr.json
          fi
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: perf-contract-pr
          path: .artifacts/perf-contract-pr.json
          retention-days: 14

      - name: Fail if lean perf gate failed
        if: steps.perf.outputs.status != '0'
        run: exit 1

  bug-evidence-httpie:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Verify HTTPie bug 3 evidence
        run: |
          mkdir -p .artifacts
          uv run ordeal benchmark \
            --verify-evidence benchmarks/evidence/httpie-3.toml \
            --online-sources \
            --output-json .artifacts/httpie-3-evidence.json

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: httpie-3-evidence
          path: .artifacts/httpie-3-evidence.json
          retention-days: 14

  bug-evidence-pysnooper:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Verify PySnooper bug 3 evidence
        run: |
          mkdir -p .artifacts
          uv run ordeal benchmark \
            --verify-evidence benchmarks/evidence/pysnooper-3.toml \
            --online-sources \
            --output-json .artifacts/pysnooper-3-evidence.json

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: pysnooper-3-evidence
          path: .artifacts/pysnooper-3-evidence.json
          retention-days: 14

  bug-evidence-tornado:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Verify Tornado bug 14 evidence
        run: |
          mkdir -p .artifacts
          uv run ordeal benchmark \
            --verify-evidence benchmarks/evidence/tornado-14.toml \
            --online-sources \
            --output-json .artifacts/tornado-14-evidence.json

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: tornado-14-evidence
          path: .artifacts/tornado-14-evidence.json
          retention-days: 14

  compose-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Validate real Compose fixture
        run: |
          docker compose version
          docker compose \
            -f tests/fixtures/compose_e2e/compose.yaml \
            config --quiet

      - name: Verify parent-side parallel liveness fallback
        run: |
          uv run pytest tests/test_explore_internals.py -q \
            -k "shared_memory_failure_falls_back_in_parent or worker_pool_hang_times_out_and_falls_back_in_parent"

      - name: Run buggy-to-fixed provider-neutral evidence loop
        run: |
          mkdir -p .artifacts
          uv run python scripts/verify_compose_evidence_loop.py \
            --output .artifacts/compose-evidence-loop.json

      - name: Validate three materially different service systems
        run: |
          uv run python scripts/verify_compose_service_matrix.py \
            --recovery-report .artifacts/compose-evidence-loop.json \
            --output .artifacts/compose-service-matrix.json

      - name: Show Compose diagnostics
        if: failure()
        continue-on-error: true
        run: |
          docker compose \
            -f tests/fixtures/compose_e2e/compose.yaml \
            --project-name ordeal-compose-e2e \
            ps -a
          docker compose \
            -f tests/fixtures/compose_e2e/compose.yaml \
            --project-name ordeal-compose-e2e \
            logs --no-color

      - name: Clean up Compose fixture
        if: always()
        run: |
          docker compose \
            -f tests/fixtures/compose_e2e/compose.yaml \
            --project-name ordeal-compose-e2e \
            down --remove-orphans

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: compose-evidence-loop
          path: |
            .artifacts/compose-evidence-loop.json
            .artifacts/compose-service-matrix.json
            tests/fixtures/compose_e2e/.ordeal/
            tests/fixtures/compose_e2e/tests/ordeal-regressions.json
            tests/fixtures/compose_e2e/tests/ordeal-compose-regressions/
            tests/fixtures/compose_persistence/.ordeal/
            tests/fixtures/compose_concurrency/.ordeal/
          if-no-files-found: warn
          retention-days: 14

  bump-and-publish:
    if: github.event_name == 'push'
    needs:
      - lint
      - test
      - perf-contract-pr
      - bug-evidence-httpie
      - bug-evidence-pysnooper
      - bug-evidence-tornado
      - compose-e2e
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Bump patch version
        run: |
          git fetch --tags
          git pull --rebase origin main
          CURRENT=$(grep -m1 '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          # Skip if this version was already tagged (e.g. re-run)
          while git tag -l "v$NEW" | grep -q .; do
            PATCH=$((PATCH + 1))
            NEW="$MAJOR.$MINOR.$((PATCH + 1))"
          done
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml
          echo "NEW_VERSION=$NEW" >> "$GITHUB_ENV"

      - name: Refresh lockfile
        run: uv lock

      - name: Update changelog
        run: |
          # Find the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Collect commits grouped by type
          FEATS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^feat" | sed 's/^- feat: /- /' | sed 's/^- feat(/- (/')
          FIXES=$(git log "$RANGE" --pretty=format:"- %s" --grep="^fix" | sed 's/^- fix: /- /' | sed 's/^- fix(/- (/')
          DOCS=$(git log "$RANGE" --pretty=format:"- %s" --grep="^docs" | sed 's/^- docs: /- /' | sed 's/^- docs(/- (/')
          OTHER=$(git log "$RANGE" --pretty=format:"- %s" --grep="^refactor\|^perf\|^test" | head -5)

          # Skip if no meaningful commits
          if [ -z "$FEATS" ] && [ -z "$FIXES" ]; then
            echo "No feat/fix commits — skipping changelog update"
            exit 0
          fi

          # Build the new entry
          ENTRY="## $NEW_VERSION"$'\n'
          if [ -n "$FEATS" ]; then
            ENTRY+=$'\n'"**Features:**"$'\n'$'\n'"$FEATS"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            ENTRY+=$'\n'"**Fixes:**"$'\n'$'\n'"$FIXES"$'\n'
          fi
          if [ -n "$DOCS" ]; then
            ENTRY+=$'\n'"**Docs:**"$'\n'$'\n'"$DOCS"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            ENTRY+=$'\n'"**Other:**"$'\n'$'\n'"$OTHER"$'\n'
          fi

          # Prepend to CHANGELOG.md (after the "# Changelog" header)
          export ENTRY
          python3 -c "
          import pathlib, os
          entry = os.environ['ENTRY']
          p = pathlib.Path('CHANGELOG.md')
          if p.exists():
              old = p.read_text()
              p.write_text(old.replace('# Changelog', '# Changelog\n\n' + entry, 1))
          else:
              p.write_text('# Changelog\n\n' + entry + '\n')
          "

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock CHANGELOG.md
          git commit -m "chore: bump version to v$NEW_VERSION [skip ci]"
          git tag "v$NEW_VERSION"
          git push
          git push --tags

      - name: Pull latest before build
        run: git pull --rebase origin main

      - name: Build
        run: pip install build && python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
