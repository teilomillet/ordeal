name: Nightly perf contract

on:
  schedule:
    - cron: "0 4 * * *"  # 04:00 UTC daily
  workflow_dispatch:       # manual trigger

permissions:
  contents: read

jobs:
  perf-nightly:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: "3.12"
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - run: uv python install 3.12

      - run: uv lock --check

      - run: uv sync --locked --extra dev

      - run: uv run python -c "import os, platform; assert platform.python_version().startswith(os.environ['UV_PYTHON'] + '.')"

      - name: Run full perf contract (all tiers)
        run: |
          set -o pipefail
          uv run ordeal benchmark --perf-contract ordeal.perf.toml --check \
            --output-json perf-results.json \
            2>&1 | tee perf-summary.txt

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: perf-results-${{ github.run_id }}
          path: |
            perf-results.json
            perf-summary.txt
          retention-days: 90
