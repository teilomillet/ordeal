name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for PyPI trusted publisher
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # setuptools-scm needs full history + tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build setuptools-scm

      - name: Verify version from tag
        run: |
          VERSION=$(python -c "from setuptools_scm import get_version; print(get_version())")
          echo "Building version: $VERSION"
          # Fail if version is 0.0.0 (tag not found)
          if [ "$VERSION" = "0.0.0" ]; then
            echo "ERROR: setuptools-scm could not resolve version from tag"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package version
        run: |
          ls dist/
          # Ensure no 0.0.0 packages
          if ls dist/ | grep -q "0.0.0"; then
            echo "ERROR: Package built as 0.0.0"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
