name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    env:
      # Strip 'v' prefix at job level so all steps see it.
      # github.ref_name = "v0.1.0" → version = "0.1.0"
      SETUPTOOLS_SCM_PRETEND_VERSION: ${{ vars.VERSION_OVERRIDE || '' }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set version from tag
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "SETUPTOOLS_SCM_PRETEND_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building ordeal $VERSION from tag $TAG"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package version
        run: |
          ls dist/
          if ls dist/ | grep -q "0.0.0"; then
            echo "ERROR: Package built as 0.0.0"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
