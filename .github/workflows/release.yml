name: Release

on:
  push:
    tags: ["v*"]

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.28"

      - name: Install release evaluation dependencies
        run: uv sync --locked --extra dev

      - name: Run release counterexample corpus
        run: |
          uv run pytest -q -n 0 \
            tests/test_release_evaluation_corpus.py \
            tests/test_evidence_closure_release.py \
            tests/test_evidence_closure_real_projects.py \
            tests/test_diff_observation.py

      - name: Validate Evidence Closure bug and fixed controls
        run: |
          mkdir -p .artifacts
          uv run python scripts/verify_evidence_closure_corpus.py \
            --output .artifacts/evidence-closure-corpus.json

      - uses: actions/upload-artifact@v7
        with:
          name: evidence-closure-corpus
          path: .artifacts/evidence-closure-corpus.json

      - name: Measure Evidence Closure on pinned public reproductions
        run: |
          uv run python scripts/verify_evidence_closure_real_projects.py \
            --output .artifacts/evidence-closure-real-projects.json

      - uses: actions/upload-artifact@v7
        with:
          name: evidence-closure-real-projects
          path: .artifacts/evidence-closure-real-projects.json

      - name: Validate pinned real repository changes
        run: |
          mkdir -p .artifacts
          uv run python scripts/verify_revision_change_corpus.py \
            --output .artifacts/revision-change-corpus.json

      - uses: actions/upload-artifact@v7
        with:
          name: revision-change-corpus
          path: .artifacts/revision-change-corpus.json

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "Expected version: $TAG"
          ls dist/
          if ! ls dist/ | grep -q "$TAG"; then
            echo "ERROR: dist/ does not contain $TAG"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
