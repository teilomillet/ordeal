# Private rolling holdout template for `ordeal benchmark --bug-manifest`.
#
# Use this track for optimization:
# - keep the cases out of prompt/examples/public docs
# - require a replay-backed oracle before adding a case
# - prefer target-level expectations when you can justify them

[certification]
enabled = true
confidence_level = 0.95
min_positive_cases = 1
min_negative_cases = 1
min_recall = 1.0
min_precision = 1.0
min_specificity = 1.0
min_confidence_bound = 0.0
require_complete = true
require_provenance = true
require_paired_controls = true

[defaults]
dataset = "rolling"
protocol = "scan"
tier = "private"
mode = "candidate"
max_examples = 30
oracle_source = "fixed commit replay plus local failing regression"
evidence_level = "local_replay"
saturation_risk = "private"
allowed_for_optimization = true
requires_python = ">=3.12"

[[cases]]
name = "replace_me"
workspace = "../private-benchmarks/recent_case"
module = "private_pkg.module"
expected_outcome = "bug"
pair_id = "replace-me"
expected_files = ["private_pkg/module.py"]
selection_reason = "Holdout bug harvested after the current prompt/model stack."
harvested_at = "2026-04-17"
fix_commit = "replace-me"
oracle_url = "https://git.example.invalid/project/commit/replace-me"
failure_command = "pytest tests/test_regression.py -q"
notes = "Generate a starter block with scripts/harvest_private_bug_benchmark_case.py."

[[cases]]
name = "replace_me_fixed_control"
workspace = "../private-benchmarks/recent_case_fixed"
module = "private_pkg.module"
expected_outcome = "clean"
pair_id = "replace-me"
expected_files = ["private_pkg/module.py"]
selection_reason = "Fixed sibling of the private holdout bug."
oracle_source = "fixed commit replay plus local passing regression"
harvested_at = "2026-04-17"
fix_commit = "replace-me"
oracle_url = "https://git.example.invalid/project/commit/replace-me"
failure_command = "pytest tests/test_regression.py -q"
notes = "Point this at the fixed checkout for the same bug and commit."
