# Public, modern reproductions for `ordeal benchmark --bug-manifest`.
#
# These cases are intentionally report-only:
# - `allowed_for_optimization = false`
# - each fixture is a minimal reproduction of a public BugsInPy patch
# - original oracle versions are provenance, not runner requirements

[certification]
enabled = false
confidence_level = 0.95
min_positive_cases = 3
min_negative_cases = 3
min_recall = 1.0
min_precision = 1.0
min_specificity = 1.0
min_confidence_bound = 0.40
require_complete = true
require_provenance = true
require_paired_controls = true
# All pairs have executable evidence; broad certification remains disabled
# because three public regressions do not estimate general accuracy.

[defaults]
dataset = "bugsinpy-reproduction"
protocol = "scan"
tier = "public"
mode = "candidate"
max_examples = 25
workspace = "fixtures"
requires_python = ">=3.12"
oracle_source = "upstream triggering test and fix recorded by BugsInPy"
evidence_level = "ported_reproduction"
saturation_risk = "public"
allowed_for_optimization = false

[[cases]]
name = "httpie_3_reproduction"
project = "httpie"
bug_id = "3"
expected_outcome = "bug"
pair_id = "bugsinpy-httpie-3"
oracle_python_version = "3.7.3"
module = "public_bugs.httpie_sessions"
expected_targets = ["public_bugs.httpie_sessions.update_headers"]
evidence_path = "evidence/httpie-3.toml"
expected_error_type = "AttributeError"
expected_error_message = "'NoneType' object has no attribute 'decode'"
expected_witness_sha256 = "bdd0c82f4c058188fce09292f1530bfa3665fb9b544189251ec6c3942a65d296"
selection_reason = "Typed reproduction of HTTPie's explicit-None header decoding crash."
fix_commit = "589887939507ff26d36ec74bd2c045819cfa3d56"
oracle_url = "https://github.com/httpie/cli/commit/589887939507ff26d36ec74bd2c045819cfa3d56"
failure_command = "upstream tests/test_sessions.py"
notes = "Modern minimal reproduction; original environment remains provenance only."

