[reproduction]
workspace = "../fixtures"
buggy_module = "public_bugs.pysnooper_writer"
fixed_module = "public_controls.pysnooper_writer"
callable = "write_to_path"
kwargs_json = '{"output":"trace.log"}'
kwargs_sha256 = "aa8a92b273e3465d2712da546a934467fc4de7a635d79465989775853efc993d"
repetitions = 5
timeout_seconds = 10.0
requires_python = ">=3.12"

[expected.buggy]
outcome = "exception"
exception_type = "NameError"
exception_message = "name 'output_path' is not defined"

[expected.fixed]
outcome = "return"
result_json = '{"path":"trace.log","text":"trace"}'

