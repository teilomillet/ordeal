schema_version = 1
evidence_id = "bugsinpy-pysnooper-3"
claim = "PySnooper's path-output closure crashed because it opened an undefined output_path name; the fix opens the declared output argument."
scope = "Only the string-path writer branch exercised by the upstream test_file_output regression is claimed."
basis = "Pinned BugsInPy metadata, immutable upstream source bytes, and fresh-process isolated replay."
online_sources_required = true
limitations = [
  "This is a modern in-memory reproduction, not the historical Python 3.8.1 environment or real disk I/O.",
  "It establishes this regression pair only; it does not estimate general bug-finding accuracy.",
]

