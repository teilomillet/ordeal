[reproduction]
workspace = "../fixtures"
buggy_module = "public_bugs.tornado_ioloop"
fixed_module = "public_controls.tornado_ioloop"
callable = "force_current_sequence"
kwargs_json = '{"make_current":true}'
kwargs_sha256 = "c49dbffe64d4cfcab1f753a0c6fade4928fef28f66bda199d3845e900dfa6972"
repetitions = 5
timeout_seconds = 10.0
requires_python = ">=3.12"

[expected.buggy]
outcome = "exception"
exception_type = "RuntimeError"
exception_message = "current IOLoop already exists"

[expected.fixed]
outcome = "return"
result_json = '{"current_preserved":true,"second_error":"current IOLoop already exists"}'

