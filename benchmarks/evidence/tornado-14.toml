schema_version = 1
evidence_id = "bugsinpy-tornado-14"
claim = "Tornado's forced-current guard rejected the first IOLoop when no current loop existed; the fix allows the first loop and rejects a second without replacing it."
scope = "Only the two-construction make_current=True lifecycle exercised by TestIOLoopCurrent.test_force_current is claimed."
basis = "Pinned BugsInPy metadata, immutable upstream source bytes, and fresh-process isolated replay."
online_sources_required = true
limitations = [
  "This is a modern state-model reproduction, not the historical Python 3.7.0 Tornado runtime.",
  "It establishes this regression pair only; it does not estimate general bug-finding accuracy.",
]

