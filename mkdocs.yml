site_name: ordeal
site_url: https://docs.byordeal.com/
site_description: >-
  Automated chaos testing for Python. Fault injection, property assertions,
  mutation testing, and coverage-guided exploration. Find the bugs your tests miss.
repo_url: https://github.com/teilomillet/ordeal
repo_name: teilomillet/ordeal
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2024 ordeal contributors

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  features:
    - content.code.copy
    - navigation.sections
    - navigation.footer
    - search.highlight
    - search.suggest
    - search.share

plugins:
  - search
  - tags

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/teilomillet/ordeal
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/ordeal/
  # Uncomment and add your tracking ID when ready:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

nav:
  - Home: index.md
  - Philosophy: philosophy.md
  - Getting Started: getting-started.md
  - Core Concepts: core-concepts.md
  - Concepts:
      - Chaos Testing: concepts/chaos-testing.md
      - Coverage Guidance: concepts/coverage-guidance.md
      - Property Assertions: concepts/property-assertions.md
      - Fault Injection: concepts/fault-injection.md
      - Shrinking: concepts/shrinking.md
  - Guides:
      - Writing Tests: guides/writing-tests.md
      - Explorer: guides/explorer.md
      - Auto Testing: guides/auto.md
      - Configuration: guides/configuration.md
      - CLI: guides/cli.md
      - Mutations: guides/mutations.md
      - Simulation: guides/simulate.md
      - Integrations: guides/integrations.md
  - Reference:
      - API: reference/api.md
  - Troubleshooting: troubleshooting.md
