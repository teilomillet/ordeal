[[cases]]
name = "import_cli"
kind = "import"
module = "ordeal.cli"
repeats = 5
max_seconds = 0.08

[[cases]]
name = "audit_demo_cold"
kind = "audit"
module = "ordeal.demo"
mode = "cold"
