# ordeal.toml — generated by ordeal init for sideeffect
#
# Run:  ordeal explore     (coverage-guided state exploration)
#       ordeal mutate      (mutation testing)
#       ordeal audit <mod> (test coverage audit)

[explorer]
target_modules = ["sideeffect"]
max_time = 30
seed = 42
rule_swarm = true
verbose = true

[[tests]]
