# ordeal.toml — dogfood configuration for ordeal itself
#
# Run: ordeal explore

[explorer]
target_modules = ["ordeal.chaos", "ordeal.faults"]
max_time = 5
max_runs = 100
steps_per_run = 20
workers = 1
seed = 42
rule_swarm = true

[[tests]]
class = "tests.test_battle:ChaosTestLifecycleBattle"

[report]
format = "text"
verbose = true
