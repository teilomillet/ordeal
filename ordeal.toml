[[tests]]
class = '.private.var.folders.j5.d3tnw1ss41g29qttjgv4dhjr0000gn.T.pytest-of-teilomillet.pytest-85.popen-gw7.test_dry_run_vs_normal_same_mo0.tests_normal.test_danger:TestSideeffectDangerChaos'

[[tests]]
class = '.private.var.folders.j5.d3tnw1ss41g29qttjgv4dhjr0000gn.T.pytest-of-teilomillet.pytest-85.popen-gw7.test_dry_run_vs_normal_same_mo0.tests_normal.test_deep:TestSideeffectNestedDeepChaos'

[mutations]
targets = ["sideeffect.danger", "sideeffect.nested", "sideeffect.nested.deep"]
